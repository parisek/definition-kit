# Type-default AI-guidance library — per field-definition-design-v2.md and
# ADR 0006. Maps abstract `type` (and, where the type is too broad on its
# own, a `kind` discriminator) to a list of default `mcp` hints. These apply
# to EVERY field of the matching type/kind and are NOT repeated in individual
# <name>.fields.yaml files — MCP tooling / dávka 3's generator compose them
# with a field's own `mcp:` (additive, never a replacement).
#
# Seeded with one entry, carried over from the mairateam preview; more
# type/kind buckets accrete here as real editorial guidance is identified —
# this is a library, not a one-off.

